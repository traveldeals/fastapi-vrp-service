<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch AI Mapping Agent</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <style>
    /* -------------------------------------------------------------
       DESIGN SYSTEM & CSS VARIABLES
       ------------------------------------------------------------- */
    :root {
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      /* Colors */
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --border-light: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      /* Accent Gradients (OKLCH based) */
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent-grad: linear-gradient(135deg, #818cf8, #c084fc);
      --success-glow: rgba(34, 197, 94, 0.2);
      --error-glow: rgba(239, 68, 68, 0.2);
      
      /* Utilities */
      --shadow-soft: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: url(#accent-grad-def);
      stroke-width: 2;
    }

    .brand h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      border: 1px solid var(--border-light);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.03);
    }

    /* Main Grid Layout */
    .main-container {
      display: grid;
      grid-template-columns: 450px 1fr;
      flex-grow: 1;
      height: calc(100vh - 65px);
      position: relative;
    }

    /* Left Sidebar: Controls & Manifest */
    .sidebar {
      background: var(--bg-dark);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 2rem;
      gap: 2rem;
      z-index: 9;
    }

    .glass-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      backdrop-filter: blur(16px) saturate(180%);
      box-shadow: var(--shadow-soft);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-main);
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }

    .form-group.depot-group {
      border-left: 3px solid #f43f5e;
      padding-left: 0.75rem;
    }

    .form-group.stop-group {
      border-left: 3px solid #818cf8;
      padding-left: 0.75rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      background: rgba(15, 23, 42, 0.9);
    }

    .stops-container {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.25rem;
    }

    /* Custom Scrollbar */
    .stops-container::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .stops-container::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      width: 100%;
      margin-bottom: 1.5rem;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      background: var(--accent-grad);
      color: #000;
      width: 100%;
      box-shadow: 0 4px 14px rgba(129, 140, 248, 0.4);
      color: #ffffff;
      font-weight: 700;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(129, 140, 248, 0.6);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-remove {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      border-radius: 6px;
    }

    .btn-remove:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    /* Manifest Result Styles */
    .manifest-panel {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .manifest-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 0.75rem;
    }

    .stat-badge {
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .manifest-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .manifest-item {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      position: relative;
    }

    .manifest-item.depot-item {
      border-left: 3px solid #f43f5e;
    }

    .manifest-item.stop-item {
      border-left: 3px solid #818cf8;
    }

    .manifest-seq {
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .manifest-details h4 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .manifest-details p {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .manifest-details .coords {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--primary);
      margin-top: 0.25rem;
    }

    /* Loader */
    .loader-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .loader-overlay p {
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    /* Right Side: Map Container */
    #map {
      width: 100%;
      height: 100%;
      background: #1e293b;
    }

    /* Leaflet Overrides for Dark Mode Map Theme */
    .leaflet-container {
      background: #111827 !important;
    }

    .leaflet-tile {
      filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3);
    }

    .leaflet-popup-content-wrapper {
      background: var(--bg-dark) !important;
      color: var(--text-main) !important;
      border: 1px solid var(--border-light) !important;
      border-radius: var(--radius-md) !important;
      backdrop-filter: blur(8px);
    }

    .leaflet-popup-tip {
      background: var(--bg-dark) !important;
      border: 1px solid var(--border-light) !important;
    }
  </style>
</head>
<body>

  <!-- Hidden Gradient definition for SVGs -->
  <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <linearGradient id="accent-grad-def" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </svg>

  <header>
    <div class="brand">
      <!-- Logistics Hex Map Icon -->
      <svg viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
      </svg>
      <h1>Dispatch AI</h1>
    </div>
    <div class="app-subtitle">Routing & Sequence Engine</div>
  </header>

  <div class="main-container">
    
    <!-- Sidebar -->
    <div class="sidebar">
      
      <!-- Input Panel -->
      <div class="glass-panel">
        <h2 class="section-title">
          <svg style="width:20px;height:20px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Configure manifest
        </h2>
        
        <div class="form-group depot-group">
          <label>Depot Hub (Starting Point)</label>
          <input type="text" id="depot-address" placeholder="e.g. 400 W Church St, Orlando, FL" value="400 W Church St, Orlando, FL 32801">
        </div>

        <label>Delivery Stops</label>
        <div id="stops-wrapper" class="stops-container">
          <!-- Initial delivery stops -->
          <div class="form-group stop-group" id="stop-field-1">
            <input type="text" class="stop-address-input" placeholder="Stop address" value="512 East Washington Street, Orlando, FL 32801">
            <button class="btn-remove" onclick="removeStopField('stop-field-1')" aria-label="Remove Stop">
              <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
          <div class="form-group stop-group" id="stop-field-2">
            <input type="text" class="stop-address-input" placeholder="Stop address" value="600 N Lake Davis Dr, Orlando, FL 32801">
            <button class="btn-remove" onclick="removeStopField('stop-field-2')" aria-label="Remove Stop">
              <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn-secondary" onclick="addStopField()">
          <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          Add Delivery Stop
        </button>

        <button class="btn btn-primary" onclick="optimizeManifest()">
          Calculate Optimized Route
        </button>
      </div>

      <!-- Optimized Manifest List Panel -->
      <div class="glass-panel manifest-panel" id="result-panel">
        <div class="manifest-header">
          <h2 class="section-title" style="margin-bottom:0;">
            <svg style="width:20px;height:20px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
            Optimized Sequence
          </h2>
          <span class="stat-badge" id="stops-count">0 Stops</span>
        </div>

        <div class="manifest-list" id="manifest-sequence-list">
          <!-- Filled dynamically by optimizeManifest() -->
        </div>
      </div>

    </div>

    <!-- Right Side: Interactive Map & Loading overlay -->
    <div style="position:relative; flex-grow:1;">
      
      <!-- Loader Overlay -->
      <div class="loader-overlay" id="loading-spinner">
        <div class="spinner"></div>
        <p id="loading-status">Computing Routing Optimization...</p>
      </div>

      <!-- Leaflet Map -->
      <div id="map"></div>
    </div>

  </div>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <script>
    // Initialize Map
    let map = L.map('map').setView([28.5383, -81.3792], 13); // Default Orlando, FL
    
    // Add Dark Mode OSM tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let stopCounter = 2;
    let mapMarkers = [];
    let routeLine = null;

    // Function to add stop input fields dynamically
    function addStopField() {
      stopCounter++;
      const wrapper = document.getElementById('stops-wrapper');
      
      const newField = document.createElement('div');
      newField.className = 'form-group stop-group';
      newField.id = `stop-field-${stopCounter}`;
      newField.innerHTML = `
        <input type="text" class="stop-address-input" placeholder="Stop address e.g. Address, City, State, Zip">
        <button class="btn-remove" onclick="removeStopField('stop-field-${stopCounter}')" aria-label="Remove Stop">
          <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      `;
      wrapper.appendChild(newField);
      // Smoothly scroll container to the bottom
      wrapper.scrollTop = wrapper.scrollHeight;
    }

    // Function to remove stop input fields
    function removeStopField(fieldId) {
      const field = document.getElementById(fieldId);
      if (field) {
        field.remove();
      }
    }

    // Call routing optimization API
    async function optimizeManifest() {
      const depotAddress = document.getElementById('depot-address').value.trim();
      const stopFields = document.querySelectorAll('.stop-address-input');
      
      if (!depotAddress) {
        alert("Please enter a depot address.");
        return;
      }

      // Collect delivery stops
      const stops = [];
      stopFields.forEach((field, index) => {
        const val = field.value.trim();
        if (val) {
          stops.push({
            id: `stop-${index + 1}`,
            name: `Stop #${index + 1}`,
            address: val
          });
        }
      });

      if (stops.length === 0) {
        alert("Please enter at least one delivery stop address.");
        return;
      }

      // Show loader
      const spinner = document.getElementById('loading-spinner');
      const spinnerStatus = document.getElementById('loading-status');
      spinner.style.display = 'flex';
      spinnerStatus.innerText = "Geocoding and compiling travel times...";

      // Clear previous map objects
      mapMarkers.forEach(m => map.removeLayer(m));
      mapMarkers = [];
      if (routeLine) {
        map.removeLayer(routeLine);
        routeLine = null;
      }

      const payload = {
        depot: {
          id: "depot-01",
          name: "Central Hub Depot",
          address: depotAddress
        },
        stops: stops
      };

      try {
        const response = await fetch('/api/v1/route/optimize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || "Route optimization failed.");
        }

        const data = await response.json();
        spinnerStatus.innerText = "Processing route sequence...";
        renderResult(data);

      } catch (error) {
        alert(`Error: ${error.message}`);
      } finally {
        spinner.style.display = 'none';
      }
    }

    // Render optimization response onto visual components
    function renderResult(data) {
      const manifestList = document.getElementById('manifest-sequence-list');
      const resultPanel = document.getElementById('result-panel');
      const stopsCountBadge = document.getElementById('stops-count');
      
      manifestList.innerHTML = '';
      stopsCountBadge.innerText = `${data.total_stops} Stops`;
      resultPanel.style.display = 'flex';

      const pathCoordinates = [];

      data.optimized_manifest.forEach((stop, index) => {
        const isDepot = (index === 0 || index === data.optimized_manifest.length - 1);
        
        // Add coordinates for path drawing
        pathCoordinates.push(stop.coordinates);

        // Add details card into sidebar list
        const card = document.createElement('div');
        card.className = `manifest-item ${isDepot ? 'depot-item' : 'stop-item'}`;
        card.innerHTML = `
          <div class="manifest-seq">${stop.sequence_position}</div>
          <div class="manifest-details">
            <h4>${stop.name}</h4>
            <p>${stop.address}</p>
            <div class="coords">${stop.coordinates[0].toFixed(5)}, ${stop.coordinates[1].toFixed(5)}</div>
          </div>
        `;
        manifestList.appendChild(card);

        // Create Custom Leaflet Marker
        if (index < data.optimized_manifest.length - 1) {
          const markerColor = isDepot ? '#ef4444' : '#818cf8';
          const markerIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div style="background-color: ${markerColor}; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 11px;">${stop.sequence_position}</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          });

          const marker = L.marker(stop.coordinates, { icon: markerIcon })
            .bindPopup(`<b>${stop.name}</b><br>${stop.address}`)
            .addTo(map);
          mapMarkers.push(marker);
        }
      });

      // Draw route sequence connection lines
      routeLine = L.polyline(pathCoordinates, {
        color: '#6366f1',
        weight: 4,
        opacity: 0.8,
        dashArray: '5, 10'
      }).addTo(map);

      // Fit map view bounds dynamically around markers
      const bounds = L.latLngBounds(pathCoordinates);
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  </script>
</body>
</html>
