steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fastapi-vrp-service:$COMMIT_SHA', '.']

  # Step 2: Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fastapi-vrp-service:$COMMIT_SHA']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fastapi-vrp-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fastapi-vrp-service:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'

options:
  logging: CLOUD_LOGGING_ONLY
